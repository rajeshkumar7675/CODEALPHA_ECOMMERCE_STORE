{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <h1 style="font-size: 2rem; margin-bottom: 1.5rem; text-align: center;">Login to Your Account</h1>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" class="form-control" autofocus required id="id_username">
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" class="form-control" required id="id_password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        <input type="hidden" name="next" value="{{ next }}">
    </form>
    
    <div style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
        Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </div>
</div>
{% endblock %}
