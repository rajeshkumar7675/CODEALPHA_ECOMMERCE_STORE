<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Store</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <header>
        <nav class="navbar">
            <a href="{% url 'home' %}" class="nav-brand">StoreLogo</a>
            <div class="nav-links">
                <a href="{% url 'home' %}" class="nav-item">Shop</a>
                {% if user.is_authenticated %}
                <a href="{% url 'cart_detail' %}" class="nav-item"
                    style="display:flex; align-items:center; gap:0.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l1.313 7h8.17l1.313-7H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" />
                    </svg>
                    Cart
                </a>
                <a href="{% url 'order_list' %}" class="nav-item">My Orders</a>
                <a href="{% url 'logout' %}" class="nav-item btn btn-danger"
                    style="color:white; padding: 0.4rem 1rem;">Logout</a>
                {% else %}
                <a href="{% url 'login' %}" class="nav-item btn btn-primary"
                    style="color:white; padding: 0.4rem 1rem;">Login</a>
                <a href="{% url 'register' %}" class="nav-item btn btn-secondary"
                    style="color:white; padding: 0.4rem 1rem;">Register</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main class="container">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}
        {% endblock content %}
    </main>
</body>

</html>
